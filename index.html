<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boom Buddy</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />

  <!-- Open Graph / Social Preview -->
  <meta property="og:title" content="Boom Buddy" />
  <meta property="og:description" content="A destructible-terrain platformer with spirit bomb energy attacks, built with WebGPU." />
  <meta property="og:image" content="/BoomBuddyPreview2.jpg" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Boom Buddy" />
  <meta name="twitter:description" content="A destructible-terrain platformer with spirit bomb energy attacks, built with WebGPU." />
  <meta name="twitter:image" content="/BoomBuddyPreview2.jpg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #fallback {
      display: none;
      color: #fff;
      font-family: monospace;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas" width="960" height="540"></canvas>
  <div id="fallback">
    <p>WebGPU is not supported in this browser.</p>
    <p>Try Chrome 113+ or Edge 113+.</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
