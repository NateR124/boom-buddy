<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boom Buddy</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />

  <!-- Open Graph / Social Preview -->
  <meta property="og:title" content="Boom Buddy" />
  <meta property="og:description" content="A destructible-terrain platformer with spirit bomb energy attacks, built with WebGPU." />
  <meta property="og:image" content="/BoomBuddyPreview2.jpg" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Boom Buddy" />
  <meta name="twitter:description" content="A destructible-terrain platformer with spirit bomb energy attacks, built with WebGPU." />
  <meta name="twitter:image" content="/BoomBuddyPreview2.jpg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #fallback {
      display: none;
      color: #fff;
      font-family: monospace;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
    #game-wrapper {
      position: relative;
    }
    #key-hints {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: end;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
    }
    .key-hint {
      width: 44px;
      height: 44px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease-out;
    }
    .key-hint.wide {
      width: 100px;
    }
    .key-hint.used {
      opacity: 0;
    }
    .key-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
  <canvas id="game-canvas"></canvas>
  <div id="fallback">
    <p>WebGPU is not supported in this browser.</p>
    <p>Try Chrome 113+ or Edge 113+.</p>
  </div>
  <div id="esc-hint" style="position:absolute;top:12px;left:12px;pointer-events:none;user-select:none;-webkit-user-select:none;z-index:10;">
    <div class="key-hint" data-key="Escape">ESC</div>
  </div>
  <div id="key-hints">
    <div class="key-row">
      <div class="key-hint" data-key="KeyA">A</div>
    </div>
    <div class="key-row">
      <div class="key-hint wide" data-key="Space">SPACE</div>
    </div>
    <div class="key-row">
      <div class="key-hint" data-key="KeyD">D</div>
    </div>
    <div class="key-row" style="margin-left: 10px;">
      <div class="key-hint" data-key="mouse" id="mouse-hint" style="width:30px;height:44px;position:relative;padding:0;">
        <svg viewBox="0 0 30 44" width="30" height="44" style="display:block;">
          <!-- Mouse body -->
          <rect x="3" y="8" width="24" height="32" rx="10" ry="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <!-- Divider -->
          <line x1="15" y1="8" x2="15" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <!-- Left button highlight -->
          <path d="M3,18 Q3,8 15,8 L15,22 L3,22 Z" fill="rgba(255,255,255,0.25)" rx="5"/>
        </svg>
      </div>
    </div>
  </div>
  </div>
  <script>
    (function() {
      // Disable right-click everywhere
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      var hints = document.querySelectorAll('.key-hint');
      var map = {};
      hints.forEach(function(el) { map[el.dataset.key] = el; });
      window.addEventListener('keydown', function(e) {
        var el = map[e.code];
        if (el && !el.classList.contains('used')) {
          el.classList.add('used');
        }
      });
      window.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
          var el = document.getElementById('mouse-hint');
          if (el && !el.classList.contains('used')) {
            el.classList.add('used');
          }
        }
      });
      // Expose a function for the game to call when player drops 100 units
      window._fadeAllHints = function() {
        var keyHints = document.getElementById('key-hints');
        var escHint = document.getElementById('esc-hint');
        if (keyHints) { keyHints.style.transition = 'opacity 0.6s'; keyHints.style.opacity = '0'; }
        if (escHint) { escHint.style.transition = 'opacity 0.6s'; escHint.style.opacity = '0'; }
        setTimeout(function() {
          if (keyHints) keyHints.remove();
          if (escHint) escHint.remove();
        }, 700);
      };
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
